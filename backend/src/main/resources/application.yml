server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ticket-market
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 120MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ticket_market?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ticket-market:
  jwt:
    issuer: ticket-market
    # Course-demo secret only. Replace it for real deployment.
    secret: ticket-market-local-demo-secret-change-me-ticket-market
    expire-minutes: 720
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://192.168.*.*
      - http://10.*.*.*
      - http://172.16.*.*
      - http://172.17.*.*
      - http://172.18.*.*
      - http://172.19.*.*
      - http://172.20.*.*
      - http://172.21.*.*
      - http://172.22.*.*
      - http://172.23.*.*
      - http://172.24.*.*
      - http://172.25.*.*
      - http://172.26.*.*
      - http://172.27.*.*
      - http://172.28.*.*
      - http://172.29.*.*
      - http://172.30.*.*
      - http://172.31.*.*

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
